<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Ummah Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-container {
      display: flex;
      width: 100%;
      max-width: 900px;
      min-height: 560px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* LEFT PANEL */
    .auth-left {
      flex: 1;
      background: linear-gradient(135deg, #0a1a12, #0d2018);
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid rgba(255,255,255,0.06);
    }

    .auth-left-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .auth-left-logo img { height: 36px; }
    .auth-left-logo span { font-size: 18px; font-weight: 600; }

    .auth-left-content h2 {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1rem;
    }

    .auth-left-content h2 span { color: #10b981; }

    .auth-left-content p {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
    }

    .auth-features {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-feature {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
    }

    .auth-feature-icon {
      width: 28px;
      height: 28px;
      background: rgba(16,185,129,0.15);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    /* RIGHT PANEL */
    .auth-right {
      flex: 1;
      background: #111;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      color: rgba(255,255,255,0.4);
      transition: all 0.2s;
      border: none;
      background: transparent;
    }

    .auth-tab.active {
      background: #10b981;
      color: #fff;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #10b981;
    }

    .form-group input::placeholder { color: rgba(255,255,255,0.2); }

    .btn-primary {
      width: 100%;
      background: #10b981;
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #059669; }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.25rem 0;
      color: rgba(255,255,255,0.2);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .btn-google {
      width: 100%;
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s;
    }

    .btn-google:hover { background: rgba(255,255,255,0.05); }

    .auth-footer {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      margin-top: 1.5rem;
    }

    .auth-footer a { color: #10b981; text-decoration: none; }
    @media (max-width: 768px) {
  .auth-container {
    flex-direction: column;
    margin: 1rem;
    min-height: auto;
  }
  .auth-left {
    padding: 2rem;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .auth-right {
    padding: 2rem;
  }
} </style>
</head>
<body>

  <div class="auth-container">

    <!-- LEFT -->
    <div class="auth-left">
      <div class="auth-left-logo">
        <img src="logo-green.png" alt="Ummah Studio" />
        <span>Ummah Studio</span>
      </div>

      <div class="auth-left-content">
        <h2>Create content with <span>purpose.</span></h2>
        <p>Turn your long-form videos into short-form social content automatically.</p>
      </div>

      <div class="auth-features">
        <div class="auth-feature">
          <div class="auth-feature-icon">🎙️</div>
          AI captions in seconds
        </div>
        <div class="auth-feature">
          <div class="auth-feature-icon">✂️</div>
          Auto clip generation
        </div>
        <div class="auth-feature">
          <div class="auth-feature-icon">📱</div>
          Vertical format exports
        </div>
        <div class="auth-feature">
          <div class="auth-feature-icon">⚡</div>
          10x faster workflow
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="auth-right">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Sign In</button>
        <button class="auth-tab" onclick="showTab('signup')">Sign Up</button>
      </div>

      <div id="login-form">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="window.location.href='dashboard.html'">Sign In</button>
        <div class="divider">or</div>
        <button class="btn-google">🔵 Continue with Google</button>
        <div class="auth-footer">
          Don't have an account? <a href="#" onclick="showTab('signup')">Sign up free</a>
        </div>
      </div>

      <div id="signup-form" style="display:none;">
        <div class="form-group">
          <label>Full name</label>
          <input type="text" placeholder="Mohammed Ibrahim" />
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="window.location.href='dashboard.html'">Create Account</button>
        <div class="divider">or</div>
        <button class="btn-google">🔵 Continue with Google</button>
        <div class="auth-footer">
          Already have an account? <a href="#" onclick="showTab('login')">Sign in</a>
        </div>
      </div>
    </div>

  </div>

  <script>
    function showTab(tab) {
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
      });
    }
  </script>

</body>
</html>
